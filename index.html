<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Bullet Hell Shooter</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>

        <!-- Фоновая музыка -->
        <audio id="bgMusic" loop preload="auto" playsinline>
    <source src="assets/bgm.mp3" type="audio/mpeg">
</audio>

        <!-- Стартовое меню -->
        <div id="startScreen">
            <h1>- 04 -</h1>
            <div id="desktopControls" class="controls">
                <p>Автострельба</p>
                <p>X — бомба</p>
                <p>Зажать Z — самонаводящиеся пули (слабый урон)</p>
            </div>
            <div id="mobileControls" class="controls hidden">
                <p>Автострельба (жёлтые пули)</p>
                <p>Нажать справа - бомба</p>
                <p>Зажать двумя пальцами — самонаводящиеся пули (слабый урон)</p>
            </div>
            <button id="startButton">ИГРАТЬ</button>
        </div>
        <!-- Экран окончания игры -->
        <div id="gameOver" class="hidden">
            <h2>Игра окончена</h2>
            <p id="finalScore"></p>
            <button id="restartButton">Играть снова</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
